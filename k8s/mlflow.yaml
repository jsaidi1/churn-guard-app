# MLflow sera accessible ici : http://localhost:5050
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: churn-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3d-churnguard-agent-0
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.12.0
          command:
            - mlflow
            - server
            - --host
            - "0.0.0.0"
            - --port
            - "5000"
            - --backend-store-uri
            - sqlite:////mlflow/mlflow.db
            - --default-artifact-root
            - /mlflow/mlruns
          env:
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: "*"
            - name: MLFLOW_SERVER_CORS_ALLOWED_ORIGINS
              value: "*"
            - name: MLFLOW_SERVER_DISABLE_SECURITY_MIDDLEWARE
              value: "true"
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: churn-guard
spec:
  type: NodePort
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050