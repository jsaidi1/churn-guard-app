# API accessible ici : http://localhost:8000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churnguard-api
  namespace: churn-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: churnguard-api
  template:
    metadata:
      labels:
        app: churnguard-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3d-churnguard-agent-0
      containers:
        - name: api
          image: churn-guard:latest
          imagePullPolicy: Never
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: churnguard-api
  namespace: churn-guard
spec:
  type: NodePort
  selector:
    app: churnguard-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080